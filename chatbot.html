<!DOCTYPE html> 
<html>
  <head>
    <title>Chatbot</title>
  </head>
  <body>
    <div class="js-container"></div>
  
    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>
    <script src="https://unpkg.com/supersimpledev/babel.js"></script>
    <script type="text/babel">

      function ChatInput() {
        return (
          // size di input box adalah berapa banyaknya karakter yang fits didalamya
          <>
            <input 
            placeholder="Send a mesage to chatbot" 
            size="40"
            />
            <button>Send</button>
          </>
        );
      }

      function ChatMessage({message, sender}){
        // props parameter itu object yang contain all attributes yg kita kasih di function return app dibawah 
         return (
          <div>
            {sender == "robot" && (
              <img src="public/robot.png" width="50"/>
            )}
            {message}
            {sender == "user" && (
              <img src="public/profile.png" width="50"/>
            )}            
          </div>
        );
      }

      function App(){
        <>
          <ChatInput />
          <ChatMessage message="hello chatbot" sender="user" /> 
          <ChatMessage message="Hello! how can i help you?" sender="robot"/> 
          <ChatMessage message="Todays date" sender="user"/> 
          <ChatMessage message="Today is July 1" sender="robot"/> 
        </>
      }

      const container = document.querySelector('.js-container');
        ReactDOM.createRoot(container).render(
          // ini yang akan di render, yang akan ditampilkan ke websitenya
          <App/>
      );

    </script>
  </body>
</html>
